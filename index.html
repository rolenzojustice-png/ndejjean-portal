<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDEJJEAN STUDENTSSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="video-bg">
        <div id="player"></div>
        <div class="overlay"></div>
    </div>

    <div class="portal-container" id="portal">
        
        <div class="form-box login" id="loginBox">
            <h2>Student Login</h2>
            <input type="text" placeholder="Student ID / Email">
            <input type="password" placeholder="Password">
            <button class="main-btn">Access Portal</button>
            <p class="toggle-text">Forgot your password? <span onclick="showForm('forgot')">Recover here</span></p>
            <p class="toggle-text">New student? <span onclick="showForm('create')">Create New Account</span></p>
        </div>

        <div class="form-box hidden" id="createBox">
            <h2>New Student Registration</h2>
            <input type="text" placeholder="Full Name">
            <input type="email" placeholder="Personal Email">
            <input type="password" placeholder="Create Password">
            <button class="main-btn">Register Account</button>
            <p class="toggle-text">Already registered? <span onclick="showForm('login')">Back to Login</span></p>
        </div>

        <div class="form-box hidden" id="forgotBox">
            <h2>Account Recovery</h2>
            <p style="font-size: 0.8rem; margin-bottom: 15px;">Enter your email to receive a reset link.</p>
            <input type="email" placeholder="Registered Email">
            <button class="main-btn">Send Reset Link</button>
            <p class="toggle-text"><span onclick="showForm('login')">Return to Login</span></p>
        </div>
        <div class="form-box hidden" id="successBox">
    <div class="checkmark-wrapper">
        <div class="checkmark-circle"></div>
        <div class="checkmark-stem"></div>
        <div class="checkmark-kick"></div>
    </div>
    <h2 id="successMessage">Request Sent!</h2>
    <p>Please check your email for the next steps.</p>
    <button class="main-btn" onclick="showForm('login')" style="margin-top: 20px;">Return to Login</button>
</div>
 
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
